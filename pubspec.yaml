name: wo
description: 窝（Wo）— 插件化家庭事务 App
publish_to: "none"
version: 0.3.16+38

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  # Material/Cupertino 组件的中文本地化（日期选择器月份、星期、确定/取消等）。
  flutter_localizations:
    sdk: flutter
  go_router: ^14.6.0
  http: ^1.2.0
  shared_preferences: ^2.3.0
  # 极光推送 SDK（远程推送主干道）。
  jpush_flutter: ^3.0.0
  # Android 13+ 运行时通知权限（POST_NOTIFICATIONS）申请。
  permission_handler: ^11.3.0
  # 菜谱封面：相册选图 + 上传前压缩 + 带版本的本地缓存。
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  cached_network_image: ^3.4.1
  # cached_network_image 用的底层缓存管理器;回忆大图长按保存时直接捞它已下好的本地文件。
  flutter_cache_manager: ^3.4.1
  # 回忆插件：播放上传的短视频（详情页全屏播放）。
  video_player: ^2.9.2
  # 回忆插件：新建时读第一张照片的 EXIF 拍摄日期，自动填进日期。
  exif: ^3.3.0
  # 回忆插件：大图页长按把图片存进系统相册（Android 走 MediaStore，iOS 走 Photos）。
  gal: ^2.3.0
  # 邀请二维码：把 qr_payload 渲染成二维码图。
  qr_flutter: ^4.1.0
  # 扫码加入：相机扫描邀请二维码。
  mobile_scanner: ^5.2.3
  # 应用内更新：读取运行时版本号、落盘下载的 APK、调起系统安装器。
  package_info_plus: ^8.0.0
  path_provider: ^2.1.0
  open_filex: ^4.5.0
  # 家历：把带日期的日程弹到手机自带「添加事件」页，用户在系统页里自定义提醒后存入本地日历。
  add_2_calendar: ^3.0.1
  # 植物日记：读取设备定位，作为家庭默认环境拉取当地天气（安卓优先，iOS 兼容）。
  geolocator: ^13.0.1
  # ── 视觉升级三件套（与 Material 3 主题共存，不替换组件体系）─────────
  # 链式声明动画：列表卡片错峰入场（fadeIn + slideY），一行即用、零侵入。
  flutter_animate: ^4.5.0
  # 官方 Material 动效：OpenContainer 让卡片点击时形变放大成详情页。
  animations: ^2.0.11
  # 骨架屏微光：首屏加载用骨架替代转圈，符合「列表不闪」约束。
  shimmer: ^3.0.0
  # 申请 Android 高刷新率：Flutter 默认锁 60fps，即便是 90/120Hz 屏，导致动画偏卡。
  flutter_displaymode: ^0.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    # 自签 CA 公钥证书,App 启动时加载并据此信任后端 HTTPS。
    - assets/certs/wo_ca.crt
    # 旅行插件:真实中国省界(简化 GeoJSON)+ 地级市经纬度 + 区县经纬度。
    - assets/maps/china_provinces.json
    - assets/maps/china_cities.json
    - assets/maps/china_districts.json
