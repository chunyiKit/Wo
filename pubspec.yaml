name: wo
description: 窝（Wo）— 插件化家庭事务 App
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.6.0
  http: ^1.2.0
  shared_preferences: ^2.3.0
  # 极光推送 SDK（远程推送主干道）。
  jpush_flutter: ^3.0.0
  # Android 13+ 运行时通知权限（POST_NOTIFICATIONS）申请。
  permission_handler: ^11.3.0
  # 菜谱封面：相册选图 + 上传前压缩 + 带版本的本地缓存。
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  cached_network_image: ^3.4.1
  # 邀请二维码：把 qr_payload 渲染成二维码图。
  qr_flutter: ^4.1.0
  # 扫码加入：相机扫描邀请二维码。
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    # 自签 CA 公钥证书,App 启动时加载并据此信任后端 HTTPS。
    - assets/certs/wo_ca.crt
