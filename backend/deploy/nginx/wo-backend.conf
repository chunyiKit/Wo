# Wo backend reverse proxy.
# TLS-terminating: nginx serves HTTPS on 443 with a self-signed cert (our own
# CA — see backend/deploy/tls/). The app trusts that CA explicitly, so this is
# effectively certificate pinning. Plain :80 only 301-redirects to https.
#
# Certs are installed by backend/deploy/tls/install-on-server.sh at:
#   /etc/wo/tls/server.crt  /etc/wo/tls/server.key

upstream wo_backend {
    server 127.0.0.1:8000;
    keepalive 16;
}

# ---- Plain HTTP: upgrade everything to HTTPS --------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # 301 so clients (and caches) remember to use https next time. The new app
    # talks https directly and never hits this; old plaintext clients get
    # bounced — which is the point of the cutover.
    return 301 https://$host$request_uri;
}

# ---- HTTPS: the real server -------------------------------------------------
server {
    # Inline `http2` keyword for nginx < 1.25.1 (the box runs 1.18). Newer nginx
    # prefers a separate `http2 on;` but still accepts this with a warning.
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;

    # Catch-all server_name so we work via raw IP. Once a domain lands, add
    # server_name wo.example.com; in front.
    server_name _;

    ssl_certificate     /etc/wo/tls/server.crt;
    ssl_certificate_key /etc/wo/tls/server.key;
    # Modern only — the sole client is our own app, no legacy handshakes needed.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Photo uploads can be up to 20 MB; allow some headroom for multipart
    # overhead. Bump this together with backend `MAX_UPLOAD_BYTES`.
    client_max_body_size 25M;

    # Slow client tolerance — long enough for mobile networks, not so long
    # that a stuck connection ties up a worker forever.
    proxy_connect_timeout 5s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    location / {
        proxy_pass http://wo_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # Memory plugin accepts short videos as well as photos, which run far larger
    # than the default body cap. Scope the bigger limit + longer timeouts to the
    # memory routes only. Keep this ≥ backend `MEMORY_VIDEO_MAX_BYTES`.
    location ~ ^/api/v1/families/[^/]+/plugins/memory/ {
        client_max_body_size 110M;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_request_buffering off;
        proxy_pass http://wo_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # In-app update (APK publish/download). The APK is much larger than a photo
    # and a phone on mobile data downloads it slowly, so this prefix gets a
    # bigger body cap and longer timeouts than the default location. Buffering
    # off so the client streams the file as it arrives rather than waiting for
    # nginx to spool the whole APK first.
    location /api/v1/app/ {
        client_max_body_size 200M;
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_buffering       off;
        proxy_request_buffering off;

        proxy_pass http://wo_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # Tiny convenience: probing root returns a one-line liveness pointer,
    # so curl on the bare IP doesn't 502 just because '/' isn't a real route.
    location = / {
        return 200 "wo backend up — try /api/v1/health\n";
        add_header Content-Type text/plain;
    }
}
